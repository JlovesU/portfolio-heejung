$(document).ready(function(){
	//Tab Content
	$('.spring_mood_tab li').on('click', function() {
		// spring_mood tab
		var tab_id = $(this).attr('data-tab');
		$('.spring_mood_tab li').removeClass('active');
		$('.spring_mood_cont').removeClass('active');
		$(this).addClass('active');
		$("#"+tab_id).addClass('active');

		// spring_mood cont - aos
		$('.spring_mood_cont [data-aos]').removeClass('aos-animate');
		setTimeout(function() {
			$('.spring_mood_cont [data-aos]').addClass('aos-animate');
		}, 200);
	});
});
</script>
