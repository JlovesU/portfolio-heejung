<style type="text/css">
/* common */
.evt_wrap {background: #eeeef4;}

/* rabbit */
.img_rabbit1 {position:absolute; bottom:7%; left:10%; display:inline-block; -webkit-animation:ani-hop 1.5s infinite; animation:ani-hop 1.25s infinite; z-index:2; width:27%;}
.img_rabbit2 {position:absolute; bottom:7%; left:60%; display:inline-block; -webkit-animation:ani-hop2 2s infinite; animation:ani-hop2 2s infinite; z-index:2; width:27%;}

.img_top_bg1,
.img_top_bg2 {position: absolute; left: 0; bottom: 0; width: 350%; will-change: transform;}
.img_top_bg1 {animation: ani-mountain 25s infinite linear;}
.img_top_bg2 {left: 350%; animation: ani-mountain 25s infinite linear;}

/* .img_top_bg1 {position:absolute; left:0; bottom:0; display:inline-block; width:350%; -webkit-animation:ani-mountain1 25s infinite linear; animation:ani-mountain1 25s infinite linear;}
.img_top_bg2 {position:absolute; left:0; bottom:0; display:inline-block; width:350%; -webkit-animation:ani-mountain2 25s infinite linear; animation:ani-mountain2 25s infinite linear;} */
@keyframes ani-hop {
	/* 0% {transform:rotate(-5deg)}
	40% {transform:rotate(-15deg) translatey(-80px);}
	65% {transform:rotate(20deg) translatey(-80px);}
	90% {transform:rotate(30deg) translatey(-20px)}
	100% {transform:rotate(20deg) translatey(5px)} */
	/* 0%. 시작: 지면, 살짝 웅크림 (기본 자세) */
    0%, 100% {
        transform: rotate(-3deg) translateY(0);
        animation-timing-function: ease-out; /* 올라갈 때 서서히 가속 */
    }
    /* 40%. 최고점: 가장 높은 곳, 고개 살짝 숙임 (점프의 반동) */
    40% {
        transform: rotate(-10deg) translateY(-60px); /* 높이는 살짝 낮춤 */
        animation-timing-function: ease-in; /* 내려올 때 서서히 가속 */
    }
    /* 65%~90%. 하강: 고개를 자연스럽게 듦 */
    70% {
        transform: rotate(10deg) translateY(-20px);
    }
    /* 95%. 착지 직전: 반동으로 살짝 숙임 */
    95% {
        transform: rotate(5deg) translateY(5px);
    }
}
@keyframes ani-hop2 {
	/* 10% {transform:rotate(-5deg)}
	55% {transform:rotate(-15deg) translatey(-120px);}
	75% {transform:rotate(40deg) translatey(-100px);}
	100% {transform:rotate(40deg) translatey(5px)} */
	0%, 100% {
        transform: rotate(-3deg) translateY(0);
        animation-timing-function: ease-out; /* 올라갈 때 서서히 가속 */
    }
    /* 40%. 최고점: 가장 높은 곳, 고개 살짝 숙임 (점프의 반동) */
    40% {
        transform: rotate(-10deg) translateY(-100px); /* 높이는 살짝 낮춤 */
        animation-timing-function: ease-in; /* 내려올 때 서서히 가속 */
    }
    /* 65%~90%. 하강: 고개를 자연스럽게 듦 */
    70% {
        transform: rotate(10deg) translateY(-20px);
    }
    /* 95%. 착지 직전: 반동으로 살짝 숙임 */
    95% {
        transform: rotate(5deg) translateY(5px);
    }
}
@keyframes ani-mountain {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); } /* 이미지 너비만큼 왼쪽으로 이동 */
}
