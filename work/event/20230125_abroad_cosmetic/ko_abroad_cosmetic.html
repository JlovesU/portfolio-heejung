<style type="text/css">
/* reset */
.location, .event_top_share, .event_detail_btn {display:none;}

/* common */
.evt_wrap {width:100%; min-width:1340px; background: #eeeef4;}

/* evt_sect-0 */

.evt_sect-0 .img_blank {height:885px !important;}

/* rabbit */
.img_rabbit1 {position:absolute; bottom:65px; left:100px; display:inline-block; -webkit-animation:ani-hop 1.2s infinite; animation:ani-hop 1.2s infinite; z-index:2;}
.img_rabbit2 {position:absolute; bottom:65px; left:700px; display:inline-block; -webkit-animation:ani-hop2 2s infinite; animation:ani-hop2 2s infinite; z-index:2;}
.img_top_bg1,
.img_top_bg2 {position: absolute; left: 0; bottom: 0; width: 1921px; will-change: transform;}
.img_top_bg1 {animation: ani-mountain 25s infinite linear;}
.img_top_bg2 {left: 1920px; animation: ani-mountain 25s infinite linear;}
@keyframes ani-hop {
	/* 0% {transform:rotate(-5deg)}
	40% {transform:rotate(-15deg) translatey(-80px);}
	65% {transform:rotate(20deg) translatey(-80px);}
	90% {transform:rotate(30deg) translatey(-20px)}
	100% {transform:rotate(20deg) translatey(5px)} */
	/* 0%. 시작: 지면, 살짝 웅크림 (기본 자세) */
    0%, 100% {
        transform: rotate(-3deg) translateY(0);
        animation-timing-function: ease-out; /* 올라갈 때 서서히 가속 */
    }
    /* 40%. 최고점: 가장 높은 곳, 고개 살짝 숙임 (점프의 반동) */
    40% {
        transform: rotate(-10deg) translateY(-60px); /* 높이는 살짝 낮춤 */
        animation-timing-function: ease-in; /* 내려올 때 서서히 가속 */
    }
    /* 65%~90%. 하강: 고개를 자연스럽게 듦 */
    70% {
        transform: rotate(10deg) translateY(-20px);
    }
    /* 95%. 착지 직전: 반동으로 살짝 숙임 */
    95% {
        transform: rotate(5deg) translateY(5px);
    }
}
@keyframes ani-hop2 {
	/* 10% {transform:rotate(-5deg)}
	55% {transform:rotate(-15deg) translatey(-120px);}
	75% {transform:rotate(40deg) translatey(-100px);}
	100% {transform:rotate(40deg) translatey(5px)} */
	0%, 100% {
        transform: rotate(-3deg) translateY(0);
        animation-timing-function: ease-out; /* 올라갈 때 서서히 가속 */
    }
    /* 40%. 최고점: 가장 높은 곳, 고개 살짝 숙임 (점프의 반동) */
    40% {
        transform: rotate(-10deg) translateY(-100px); /* 높이는 살짝 낮춤 */
        animation-timing-function: ease-in; /* 내려올 때 서서히 가속 */
    }
    /* 65%~90%. 하강: 고개를 자연스럽게 듦 */
    70% {
        transform: rotate(10deg) translateY(-20px);
    }
    /* 95%. 착지 직전: 반동으로 살짝 숙임 */
    95% {
        transform: rotate(5deg) translateY(5px);
    }
}
@keyframes ani-mountain {
    from { transform: translateX(0); }
    to { transform: translateX(-1919px); } /* 이미지 너비만큼 왼쪽으로 이동 */
}

/* evt_sect-1  */
.evt_sect-1 {background:url("https://cdn.hddfs.com/files/editor/20230125/30918639_202301251417135120.png") no-repeat center bottom; text-align:center; padding-bottom:335px;}/*하단 이미지*/

/* tab */

.tab_evt .btn_tab1 a {background-position-x: 0px;}

.tab_evt li a.active,
.tab_evt li a:hover {background-position-y:100%;}
.ev_tab_sub_cont {display:none;}
.ev_tab_sub_cont.active {display:block;}
</style>

$(document).ready(function(){
