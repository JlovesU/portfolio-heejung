<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Web Publisher Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --main-purple: #6C4DFF;
  --dark-purple: #4B32C3;
  --light-purple: #F3F0FF;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Pretendard', sans-serif;
  background: #fff;
  color: #222;
  overflow-x: hidden;
}

/* ===== Header ===== */
header {
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  padding: 20px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  transition: 0.3s;
}

header.scrolled {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.logo {
  font-weight: 700;
  font-size: 20px;
  color: var(--main-purple);
}

nav ul {
  display: flex;
  list-style: none;
  gap: 40px;
}

nav a {
  text-decoration: none;
  color: #444;
  font-weight: 500;
  position: relative;
}

nav a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -6px;
  width: 100%;
  height: 2px;
  background: var(--main-purple);
}

nav a:hover {
  color: var(--main-purple);
}

/* ===== Section ===== */
section {
  min-height: 100vh;
  padding: 140px 60px 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: 700;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

#home {
  background: linear-gradient(135deg, #6C4DFF, #9F8CFF);
  color: white;
}

#about { background: var(--light-purple); }
#work { background: #fff; }
#contact { background: #f9f9ff; }

/* ===== Hamburger ===== */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  z-index: 1100;
}

.hamburger span {
  width: 28px;
  height: 3px;
  background: var(--main-purple);
  transition: 0.3s;
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(6px, 6px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px, -6px);
}

/* ===== Mobile Menu ===== */
.mobile-menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 80%;
  height: 100vh;
  background: white;
  padding: 120px 40px;
  transition: 0.4s;
  z-index: 1050;
  box-shadow: -10px 0 30px rgba(0,0,0,0.1);
}

.mobile-menu ul {
  list-style: none;
}

.mobile-menu li {
  margin-bottom: 30px;
}

.mobile-menu a {
  text-decoration: none;
  font-size: 22px;
  color: #333;
}

.mobile-menu.active {
  right: 0;
}

.dim {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  visibility: hidden;
  transition: 0.4s;
  z-index: 1000;
}

.dim.active {
  opacity: 1;
  visibility: visible;
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
  nav {
    display: none;
  }

  .hamburger {
    display: flex;
  }
}

@media (max-width: 768px) {
  section {
    font-size: 32px;
    padding: 120px 30px 60px;
  }

  header {
    padding: 20px 30px;
  }
}
</style>
</head>

<body>

<header id="header">
  <div class="logo">HEEJUNG</div>

  <nav>
    <ul>
      <li><a href="#home" class="nav-link active">Home</a></li>
      <li><a href="#about" class="nav-link">About</a></li>
      <li><a href="#work" class="nav-link">Work</a></li>
      <li><a href="#contact" class="nav-link">Contact</a></li>
    </ul>
  </nav>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<div class="mobile-menu" id="mobileMenu">
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#work">Work</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</div>

<div class="dim" id="dim"></div>

<section id="home">Creative Web Publisher</section>
<section id="about">About Me</section>
<section id="work">My Work</section>
<section id="contact">Contact</section>

<script>
const header = document.getElementById("header");
const sections = document.querySelectorAll("section");
const navLinks = document.querySelectorAll(".nav-link");
const hamburger = document.getElementById("hamburger");
const mobileMenu = document.getElementById("mobileMenu");
const dim = document.getElementById("dim");

/* ===== Header Scroll Effect ===== */
window.addEventListener("scroll", () => {
  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }

  let current = "";
  sections.forEach(section => {
    const sectionTop = section.offsetTop - 200;
    if (pageYOffset >= sectionTop) {
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(link => {
    link.classList.remove("active");
    if (link.getAttribute("href") === "#" + current) {
      link.classList.add("active");
    }
  });
});

/* ===== Fade-in Animation ===== */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
}, { threshold: 0.2 });

sections.forEach(section => {
  observer.observe(section);
});

/* ===== Mobile Menu ===== */
hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("active");
  mobileMenu.classList.toggle("active");
  dim.classList.toggle("active");
});

dim.addEventListener("click", () => {
  hamburger.classList.remove("active");
  mobileMenu.classList.remove("active");
  dim.classList.remove("active");
});

document.querySelectorAll(".mobile-menu a").forEach(link => {
  link.addEventListener("click", () => {
    hamburger.classList.remove("active");
    mobileMenu.classList.remove("active");
    dim.classList.remove("active");
  });
});
</script>

</body>
</html>
