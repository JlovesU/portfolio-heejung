<script>

$(document).ready(function(){
	//상품리스트로 이동
	$('.btn_prod_list').click(function(e){
		e.preventDefault();
		if($("#evtTab").hasClass("fixed")){
			$("html,body").animate({scrollTop:$(".evntGoosListArea").offset().top - 140}, 500);
		} else {
			$("html,body").animate({scrollTop:$(".evntGoosListArea").offset().top - 255}, 500);
		}
	});

	var evtAOS = function() {
		AOS.init({
			offset: 200, // default: 120
			duration: 600, //default: 400
			easing: 'ease-out' //default: ease
		});
	}
	setTimeout(function() {
		evtAOS();
	}, 400);

	var swiperItem = new Swiper('.section1 .plus_swiper', {
		effect : 'fade', 
		fadeEffect: { 
			crossFade: true 
		},
		observer: true,  
		observeParents: true,
		loop: true,
		loopAdditionalSlides: 1,
		navigation: {
			nextEl: ".swiper-button-next",
			prevEl: ".swiper-button-prev",
		},
	});
});
