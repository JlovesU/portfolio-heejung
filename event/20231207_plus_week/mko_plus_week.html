        AOS.init({
            offset: 200, // default: 120
            duration: 600, //default: 400

        loop: true,
        loopAdditionalSlides: 1,
        navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",

    });
});
