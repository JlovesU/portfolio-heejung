<script type="text/javascript">
	$(document).ready(function(){
	    $("#ev_random_win").dialog({
	        autoOpen: false,
	        resizable: false,
	        width:400,
	        maxHeight: 720,
	        modal: true

	//이벤트 참여 처리
	function addEvnt2(evntId){
	    // 로그인체크
	    if(!isLogin){ alert("로그인 후 이용해주세요."); login(); return; }

	    // 기본값 설정
	    var bnfSeq = typeof(bnfSeq) == "undefined" ? 0 : bnfSeq;

	    // 전송
	    $.ajax({
	        async       : false,
	        url         : ctx_curr + "/op/evnt/evntJoinValidation.json",
	        dataType    : "json",
	        type        : "POST",
	        data        : { evntId : evntId, bnfSeq : bnfSeq },
	        success     : function(data, textStatus, jqXHR){
	        	if(!crew.ajaxValidate(data)){ return; }
	            $.ajax({
	                async       : false,
	                url         : ctx_curr + "/op/evnt/evntJoin.json",
	                dataType    : "json",
	                type        : "POST",
	                data        : { evntId : evntId, bnfSeq : bnfSeq },
	                success     : function(data, textStatus, jqXHR){

	                    if(!crew.ajaxValidate(data)){ return; }

	                    // 이벤트 참여 결과 내용 구성
	                    var winInfo = [];
	                    var winType = "";
	                    var svmtAmt = "";
	                    var cupNm = "";
	                    var cupDcAmt = "";
	                    var cupDcRate = "";
	                    var curCd = "";
	                    var famtYn = "";

	                    // 이벤트 당첨레이어팝업 초기화
	                    $("#event_result_msg").html("");
	                    $("#event_msg_box").html("");
	                    $("#event_info_mst").html("");

	                    // 상세항목 구성
	                    var bnfListWinResult = data.info.bnfListWinResult;
	                    for(var i=0, bnf ; bnf = bnfListWinResult[i] ; i++){
	                        if(bnf.svmtId != null){
	                            winInfo.push("적립금 " + comma(bnf.rsvgAmt) + "원");
	                            winType = "svmt";
	                            svmtAmt = comma(bnf.rsvgAmt);
	                        }

	                        if(bnf.cupId != null){
	                            winInfo.push("쿠폰 " + bnf.cupNm);
	                            winType = "cup";
	                            cupNm = bnf.cupNm;
	                            cupDcAmt = comma(bnf.cupDcAmt);
	                            cupDcRate = bnf.cupDcRate;
	                            curCd = bnf.curCd;
	                            famtYn = bnf.famtYn;
	                        }

	                        if(bnf.evntGvawCommNm != null){
	                            winInfo.push(bnf.evntGvawCommNm);
	                            winType = "gvaw";
	                        }
	                    }

	                    if(winInfo.length != 0){
	                        $("#event_result_msg").html("축하합니다!<br>"+winInfo.join(",")+"에 당첨되었습니다.");

	                    }else{
	                        $("#event_result_msg").html("꽝!<br>아쉽지만 다음 기회를 노려주세요.");
	                    }

	                    var msgBox = [];
	                    if(winType == "svmt"){  //적립금
	                        msgBox.push('<div class="save_coupon_box sm ">');
	                        msgBox.push('    <p class="tit">적립금</p>');
	                        msgBox.push('    <p class="resize win"><span>￦</span>'+svmtAmt+'</p>');
	                        msgBox.push('</div>');
	                        $("#evnt_info_msg").html("다운로드 받은 혜택은 마이현대에서 확인하세요.");

	                    }else if(winType == "cup"){ //쿠폰
	                        msgBox.push('<div class="save_coupon_box cp">');
	                        msgBox.push('    <p class="tit">'+cupNm+'</p>');
	                        if(famtYn == "Y"){
	                            if(curCd == "USD"){
	                                msgBox.push('    <p class="sale">$<span>'+cupDcAmt+'</span></p>');
	                            }else{
	                                msgBox.push('    <p class="sale"><span>'+cupDcAmt+'</span>원</p>');
	                            }
	                        }else if(famtYn == "N"){
	                            msgBox.push('    <p class="sale"><span>'+cupDcRate+'</span>%</p>');
	                        }
	                        msgBox.push('</div>');
	                        $("#evnt_info_msg").html("다운로드 받은 혜택은 마이현대에서 확인하세요.");

	                    }else if(winType == "gvaw"){ //상품
	                        msgBox.push('<div class="save_coupon_box"><img src="http://dev.hddfs.com:9986/event/images/KO/product/ev_img01.png" alt=""></div>');
	                        $("#evnt_info_msg").html("당첨 경품 지급 관련하여 상세내용은 페이지 하단 유의사항을 확인해주세요.");

	                    }else{  //꽝
	                        msgBox.push('<div class="save_coupon_box"><img src="http://dev.hddfs.com:9986/event/images/KO/product/ev_img02.png" alt=""></div>');

	                    }
	                    $("#event_msg_box").html(msgBox.join(''));

	                    FitAll();
	                    $("#ev_random_win").dialog('open');
	                },
	                error       : function(jqXHR, textStatus, errorThrown){
	                    //console.log(jqXHR.status);
	                }
	            });
	        },
	        error       : function(jqXHR, textStatus, errorThrown){
	            //console.log(jqXHR.status);
	        }
	    });
	}
	
	
	
	
	//리사이징 폰트
    function measureText(pText, pFontSize) {
        
        var resizeFont = document.createElement('p');
    
        document.body.appendChild(resizeFont);
        
        resizeFont.style.fontSize = "" + pFontSize + "px";
        resizeFont.style.position = "absolute";
        resizeFont.style.left = -1000;
        resizeFont.style.top = -1000;
        
        resizeFont.innerHTML = pText;
    
        var lResult = {
            width: resizeFont.clientWidth,
            height: resizeFont.clientHeight
        };
    
        document.body.removeChild(resizeFont);
        resizeFont = null;
    
        return lResult;
    }
    function fitText(el){
        
        var text = el.text();
        var fsize = parseFloat(el.css('font-size'));
        
        var measured = measureText(text, fsize);
        
        if (measured.width > el.width()){
        
        while(true){
            fsize = parseFloat(el.css('font-size'));
            var m = measureText(text, fsize);
            if(m.width > el.width()){
            el.css('font-size', fsize-0.5 + 'px');
            }
            else{
            break;
            }
        }
        }
    }
    
    function FitAll(){
        $('.resize').each(function(index, el){
            fitText($(el));
        })
    }
   
</script>
