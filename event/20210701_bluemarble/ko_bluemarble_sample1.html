<style type="text/css">
	/* coommon */
	.clearfix:after {content: ""; display: table; clear: both}

	/* button */
	.roll-button {margin: 15px auto}
	button {padding: 10px 50px; color: #ffffcc; background: #AA4F39; border: none; border-radius: 8px; box-shadow: 0 3px #802915; outline: none; transition: .3s}
	button:hover, button:active {outline: none; background: #802915; cursor: pointer; padding: 11px 50px 9px 50px; margin-top: 15px}
	.dice-board {width: 100%; height: 50%}
	.container-dice {display: inline-block; margin-top: 100px; width: 300px; margin: 50px auto 0 auto}
	.dice {position: relative; width: 200px; height: 200px; transform-style: preserve-3d; transition: transform 1s}
	.divot {position: absolute; width: 40px; height: 40px; margin: -20px 0 0 -20px; border-radius: 20px; background: #000}
	.dice-one {margin-left: 150px}
	.dice-two {margin-left: 150px}
	.side {background-color: rgba(255, 255, 204, 0.97); position: absolute; width: 200px; height: 200px; border: 2px solid black}
	.side:nth-child(1) {transform: translateZ(100px)}
	.side:nth-child(6) {transform: rotateY(180deg) translateZ(100px)}
	.side:nth-child(3) {transform: rotateY(90deg) translateZ(100px)}
	.side:nth-child(4) {transform: rotateY(-90deg) translateZ(100px)}
	.side:nth-child(5) {transform: rotateX(90deg) translateZ(100px)}
	.side:nth-child(2) {transform: rotateX(-90deg) translateZ(100px)}
	.show-1 {transform: rotateX(720deg) rotateZ(-720deg)}
	.show-6 {transform: rotateX(-900deg) rotateZ(1080deg)}
	.show-3 {transform: rotateY(-450deg) rotateZ(-1440deg)}
	.show-4 {transform: rotateY(810deg) rotateZ(720deg)}
	.show-5 {transform: rotateX(-810deg) rotateZ(-1080deg)}
	.show-2 {transform: rotateX(450deg) rotateZ(-720deg)}

	/* dice dots */
	.two-1, .three-1, .four-1, .five-1, .six-1 {top: 20%; left: 20%}
	.four-3, .five-3, .six-4 {top: 20%; left: 80%}
	.one-1, .three-2, .five-5 {top: 50%; left: 50%}
	.four-2, .five-2, .six-3 {top: 80%; left: 20%}
	.two-2, .three-3, .four-4, .five-4, .six-6 {top: 80%; left: 80%}
	.six-2 {top: 50%; left: 20%}
	.six-5 {top: 50%; left: 80%}
</style>

<script>
	// Dice Roll
	var elDiceOne  = document.getElementById('dice1');
	var elDiceTwo  = document.getElementById('dice2');
	var elStart  = document.getElementById('srartButton');

	elStart.onclick = function () {comeOutRoll();};

	// Come Out Roll Function
	function comeOutRoll() {

		// Initial dice variables
		var diceOne   = Math.floor((Math.random() * 6) + 1);
		var diceTwo   = Math.floor((Math.random() * 6) + 1);
		var rollTotal = diceOne + diceTwo;

		console.log(rollTotal + ' ' + diceOne + ' ' + diceTwo);
		elDiceOne.classList.toggle('animate');
		elDiceTwo.classList.toggle('animate');

		//Dice reset and display
		for (var i = 1; i <= 6; i++) {
			elDiceOne.classList.remove('show-' + i);
			if (diceOne === i) {
				elDiceOne.classList.add('show-' + i);
			}
		}
		for (var k = 1; k <= 6; k++) {
			elDiceTwo.classList.remove('show-' + k);
			if (diceTwo === k) {
				elDiceTwo.classList.add('show-' + k);
			}
		}
	}
</script>
