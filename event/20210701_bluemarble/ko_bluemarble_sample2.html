<style type="text/css">
.dice {
align-items: center;
display: grid;
grid-gap: 2rem;
grid-template-columns: repeat(auto-fit, minmax(8rem, 1fr));
grid-template-rows: auto;
justify-items: center;
padding: 2rem;
perspective: 600px;
border-radius: 5px;
}
.die-list {
display: grid;
grid-template-columns: 1fr;
grid-template-rows: 1fr;
height: 4rem;
list-style-type: none;
transform-style: preserve-3d;
width: 4rem;
}
.even-roll {
transition: transform 1.5s ease-out;
}
.odd-roll {
transition: transform 1.25s ease-out;
}
.die-item {
background-color: #fff;
box-shadow: inset -0.35rem 0.35rem 0.75rem rgba(0, 0, 0, 0.3),
	inset 0.5rem -0.25rem 0.5rem rgba(0, 0, 0, 0.15);
display: grid;
grid-column: 1;
grid-row: 1;
grid-template-areas:
	"one two three"
	"four five six"
	"seven eight nine";
grid-template-columns: repeat(3, 1fr);
grid-template-rows: repeat(3, 1fr);
height: 100%;
padding:0.76rem;
width: 100%;
}
.dot {
align-self: center;
background-color: #676767;
border-radius: 50%;
box-shadow: inset -0.15rem 0.15rem 0.25rem rgba(0, 0, 0, 0.5);
display: block;
height: 1rem;
justify-self: center;
width: 1rem;
}

.even-roll[data-roll="1"] {
transform: rotateX(360deg) rotateY(720deg) rotateZ(360deg);
}
.even-roll[data-roll="2"] {
transform: rotateX(450deg) rotateY(720deg) rotateZ(360deg);
}
.even-roll[data-roll="3"] {
transform: rotateX(360deg) rotateY(630deg) rotateZ(360deg);
}
.even-roll[data-roll="4"] {
transform: rotateX(360deg) rotateY(810deg) rotateZ(360deg);
}
.even-roll[data-roll="5"] {
transform: rotateX(270deg) rotateY(720deg) rotateZ(360deg);
}
.even-roll[data-roll="6"] {
transform: rotateX(360deg) rotateY(900deg) rotateZ(360deg);
}
.odd-roll[data-roll="1"] {
transform: rotateX(-360deg) rotateY(-720deg) rotateZ(-360deg);
}
.odd-roll[data-roll="2"] {
transform: rotateX(-270deg) rotateY(-720deg) rotateZ(-360deg);
}
.odd-roll[data-roll="3"] {
transform: rotateX(-360deg) rotateY(-810deg) rotateZ(-360deg);
}
.odd-roll[data-roll="4"] {
transform: rotateX(-360deg) rotateY(-630deg) rotateZ(-360deg);
}
.odd-roll[data-roll="5"] {
transform: rotateX(-450deg) rotateY(-720deg) rotateZ(-360deg);
}
.odd-roll[data-roll="6"] {
transform: rotateX(-360deg) rotateY(-900deg) rotateZ(-360deg);
}
[data-side="1"] {
transform: rotate3d(0, 0, 0, 90deg) translateZ(3rem);
}
[data-side="2"] {
transform: rotate3d(-1, 0, 0, 90deg) translateZ(3rem);
}
[data-side="3"] {
transform: rotate3d(0, 1, 0, 90deg) translateZ(3rem);
}
[data-side="4"] {
transform: rotate3d(0, -1, 0, 90deg) translateZ(3rem);
}
[data-side="5"] {
transform: rotate3d(1, 0, 0, 90deg) translateZ(3rem);
}
[data-side="6"] {
transform: rotate3d(1, 0, 0, 180deg) translateZ(3rem);
}
[data-side="1"] .dot:nth-of-type(1) {
grid-area: five;

<script>
	function rollDice() {
	const dice = [...document.querySelectorAll(".die-list")];
	dice.forEach(die => {
		toggleClasses(die);
		die.dataset.roll = getRandomNumber(1, 6);
	});
	}

	function toggleClasses(die) {
	die.classList.toggle("odd-roll");
	die.classList.toggle("even-roll");
	}

	function getRandomNumber(min, max) {
	var min = Math.ceil(min);
	var max = Math.floor(max);
	return Math.floor(Math.random() * (max - min + 1)) + min;
	var rollTotal = min + max;
	console.log(rollTotal);
	}
	

	document.getElementById("roll-button").addEventListener("click", rollDice);

</script>
