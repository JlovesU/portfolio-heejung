$(function(){
	//메인 진입시 실행
	mainInit();
	
	//해시값으로 페이지 이동 시
	var hashDiv = window.location.hash.substring().slice(0, 7);
	if (hashDiv == "#evtTab"){
		$('html,body').animate({scrollTop:$("#evtTab").offset().top - 120}, 500);
	}

	// tab fixed
	var tabFix = function() {
		var tabStr = $("#evtCont").offset();
		var tabEnd = $("#footer").offset();
		var tabEndHH = $("#footer").height();
		var headerHH = $(".header").height();

		if (($(window).scrollTop() > tabStr.top - 115 - headerHH) && ($(window).scrollTop() < tabEnd.top - headerHH - tabEndHH)) {
			$("#evtTab").addClass("fixed");
			$("#evtTab").removeClass("stop");
			$(".evt_nav .wrapper").css("top", headerHH);
		} else {
			$("#evtTab").removeClass("fixed");
			$("#evtTab").removeClass("stop");
			$(".evt_nav .wrapper").css("top", 0);
		}
	}
	$(window).scroll(function() {
		tabFix();
	});

	// 상품 리스트
	function dataProd() {
		$(".list_brand li a").each(function(){
			// let dataLink = $(this).attr('data-url');
			let dataImg = $(this).find('img').attr('data-img');
			let dataBrand = $(this).find('.prod_brand').text();
			// $(this).attr('href','https://www.hddfs.com/shop/' + dataLink);
			$(this).find('img').attr('src','https://cdn.hddfs.com/files/' + dataImg + '?sf=webp&RS=350').attr('alt', dataBrand);
			$(this).append('<span class="prod_btn">바로가기</span>');
		});
	};dataProd();

	//하단 상품리스트 이동, 상품 탭 리스트도 변경

	}
});
