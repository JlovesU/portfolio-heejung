$(function(){

	//mainInit();
	
	//해시값으로 페이지 이동 시
	var hashDiv = window.location.hash.substring().slice(0, 8);
	if (hashDiv == "#evtView"){
		$('html,body').animate({scrollTop:$("#evtView").offset().top - 60}, 500);
	}

	 // tab fixed
     var tabFix = function() {
        var tabStr = $("#evtCont").offset();
        var tabEnd = $(".foot_wrap").offset();
        var tabEndHH = $(".foot_wrap").height();
        var headerHH = $(".header").height();

        if (($(window).scrollTop() > tabStr.top - headerHH) && ($(window).scrollTop() < tabEnd.top - headerHH)) {
            $("#evtTab").addClass("fixed");
            $("#evtTab").removeClass("stop");
            $(".evt_nav .wrapper").css("top", headerHH);
        } else {
            $("#evtTab").removeClass("fixed");
            $("#evtTab").removeClass("stop");
            $(".evt_nav .wrapper").css("top", 0);
        }
    }
    $(window).scroll(function() {
        tabFix();
    });

	// 상품 리스트

function mainInit(){
	if(isLogin){
		$(".evt_amount").addClass("login");
		
		$.ajax({
			async       : false,
			url         : ctx_curr + "/op/evnt/otsdEvnt/otsdEvntBuyAmt.json",
			dataType    : "json",
			type        : "POST",
			data        : { evntId : "0005577" },
			success     : function(data, textStatus, jqXHR){

				// 오프라인 : data.oflnBuyAmt
				// 온라인 : data.onlnBuyAmt
				// 총구매 : data.totalAmt
				// 응모권 : data.ptcpCnt
				// console.log("온라인>>>"  +onlnBuyAmt);
				// console.log("오프라인>>>"  +oflnBuyAmt);

				//응모권 2자리 수 만들기
				let ticketNum = String(data.ptcpCnt).padStart(2, "0");

				//응모권 수 data
				$(".evt_wrap").attr("data-ticket", data.ptcpCnt);

				$(".evt_amount .online .box_sum").text(data.oflnBuyAmt);
				$(".evt_amount .offline .box_sum").text(data.onlnBuyAmt);
				$(".evt_amount .total .box_sum").text(data.totalAmt);
				$(".evt_amount .box_ticket .box_sum").text(ticketNum);

				//응모권 있을 때 응모하기 버튼 노출
				if(data.ptcpCnt >= 1) {
					$(".evt_wrap .evt__btn").addClass("active");
				}
			},
				error       : function(jqXHR, textStatus, errorThrown){
				//console.log(jqXHR.status);
				/* 이벤트 신청 및 당첨, 응모 실패 시 동작 */
			}
		});
	}
}
function addEvnt2(evntId){
     // 로그인체크
    if(!isLogin){ alert("로그인 후 이용해주세요."); login(); return; }

    // 응모권수 체크
    $.ajax({
			async       : false,
			url         : ctx_curr + "/op/evnt/otsdEvnt/otsdEvntBuyAmt.json",
			dataType    : "json",
			type        : "POST",
			data        : { evntId : evntId },
			success     : function(data, textStatus, jqXHR){

				// 오프라인 : data.oflnBuyAmt
				// 온라인 : data.onlnBuyAmt
				// 총구매 : data.totalAmt
				// 응모권 : data.ptcpCnt
				// console.log("온라인>>>"  +onlnBuyAmt);
				// console.log("오프라인>>>"  +oflnBuyAmt);

				//응모권 있을 때 이벤트 참여
				if(data.ptcpCnt >= 1) {

					$.ajax({
						async       : false,
						url         : ctx_curr + "/op/evnt/evntJoinValidation.json",
						dataType    : "json",

						data        : { evntId : evntId },
						success     : function(data, textStatus, jqXHR){

							if(!crew.ajaxValidate(data)){ return; }
							$.ajax({
								async       : false,
								url         : ctx_curr + "/op/evnt/evntJoin.json",
								dataType    : "json",
								type        : "POST",
								data        : { evntId : evntId },
								success     : function(data, textStatus, jqXHR){
									if(!crew.ajaxValidate(data)){ return; }

									/* 이벤트 신청 및 당첨, 응모 성공 시 동작 */
									alert("응모권" + data.ptcpCnt + "개가 사용 완료되었습니다 :)");
								},
									error       : function(jqXHR, textStatus, errorThrown){
									//console.log(jqXHR.status);
									/* 이벤트 신청 및 당첨, 응모 실패 시 동작 */
								}
							});
						},
							error       : function(jqXHR, textStatus, errorThrown){
							//console.log(jqXHR.status);
							/* 이벤트 신청 및 당첨, 응모 실패 시 동작 */
						}
					});

				/* 이벤트 신청 및 당첨, 응모 실패 시 동작 */
			}
		});
		
		
};
