<link href="https://cdn.hddfs.com/front/css/KO/aos.css" rel="stylesheet">
<script src="https://cdn.hddfs.com/front/js/KO/aos.js"></script>
<script>
$(window).load(function(){
	var evtAOS = function() {
		AOS.init({
			duration: 600, //default: 400
			easing: 'ease-out' //default: ease
		});
	}

	//main swiper
	var mainSwiper = new Swiper('.evt_main_slide', {
		slidesPerView: 1,
		pauseOnMouseEnter: true,
		allowTouchMove: true,
		watchOverflow:true,
		loop:true,
		speed:1000,
		navigation: {
			nextEl: '.evt_main_slide .swiper-button-next',
			prevEl: '.evt_main_slide .swiper-button-prev',
		},
		pagination: {
			el: '.evt_main_slide .swiper_paging',
		},
		effect: 'fade',
		fadeEffect: { 
			crossFade: true 
		},
		on: {
			slideChange: function () {
				$('.evt_main_slide .swiper-slide-next .abs').hide();
				$('.evt_main_slide .swiper-slide-next .abs').removeClass('aos-init').removeClass('aos-animate');
				$('.evt_main_slide .swiper-slide-prev .abs').hide();
				$('.evt_main_slide .swiper-slide-prev .abs').removeClass('aos-init').removeClass('aos-animate');
				
				setTimeout(function() {
					$('.evt_main_slide .swiper-slide-active .abs').show();
					evtAOS();
				}, 400);
			},
		} 
	});

	//brand swiper
	var brandSwiper = new Swiper('.swiper_brand', {
		slidesPerView: 1,
		pauseOnMouseEnter: true,
		allowTouchMove: true,
		watchOverflow:true,
		loop:true,
		navigation: {
			nextEl: '.swiper_brand .swiper-button-next',
			prevEl: '.swiper_brand .swiper-button-prev',
		},
		effect: 'fade',
		fadeEffect: { 
			crossFade: true 
		},
		autoplay: {
			disableOnInteraction: true,
			delay: 3000,
		},
		pauseOnMouseEnter:true,
		observer: true,
		observeParents: true,
	});
	
	$(".swiper_brand").mouseenter(function(){
		brandSwiper.autoplay.stop();
	});

	$(".swiper_brand").mouseleave(function(){
		brandSwiper.autoplay.start();
	});


	var ticking = false;
var isFirefox = /Firefox/i.test(navigator.userAgent);
var isIe = /MSIE/i.test(navigator.userAgent) || /Trident.*rv\:11\./i.test(navigator.userAgent);
var scrollSensitivitySetting = 30;
var slideDurationSetting = 800;
var currentSlideNumber = 0;
var totalSlideNumber = $('.background').length;
function parallaxScroll(evt) {
	if (isFirefox) {
		delta = evt.detail * -120;
	} else if (isIe) {
		delta = -evt.deltaY;
	} else {
		delta = evt.wheelDelta;
	}
	if (ticking != true) {
		if (delta <= -scrollSensitivitySetting) {
			ticking = true;
			if (currentSlideNumber !== totalSlideNumber - 1) {
				currentSlideNumber++;
				nextItem();
			}
			slideDurationTimeout(slideDurationSetting);
		}
		if (delta >= scrollSensitivitySetting) {
			ticking = true;
			if (currentSlideNumber !== 0) {
				currentSlideNumber--;
			}
			previousItem();
			slideDurationTimeout(slideDurationSetting);
		}
	}
}
function slideDurationTimeout(slideDuration) {
	setTimeout(function () {
		ticking = false;
	}, slideDuration);
}
var mousewheelEvent = isFirefox ? 'DOMMouseScroll' : 'wheel';
window.addEventListener(mousewheelEvent, _.throttle(parallaxScroll, 60), false);
function nextItem() {
	var $previousSlide = $('.background').eq(currentSlideNumber - 1);
	$previousSlide.css('transform', 'translate3d(0,-130vh,0)').find('.content-wrapper').css('transform', 'translateY(40vh)');
	currentSlideTransition();
}
function previousItem() {
	var $previousSlide = $('.background').eq(currentSlideNumber + 1);
	$previousSlide.css('transform', 'translate3d(0,30vh,0)').find('.content-wrapper').css('transform', 'translateY(30vh)');
	currentSlideTransition();
}
function currentSlideTransition() {
	var $currentSlide = $('.background').eq(currentSlideNumber);
	$currentSlide.css('transform', 'translate3d(0,-15vh,0)').find('.content-wrapper').css('transform', 'translateY(4.5vh)');
	
	setTimeout(function() {
		evtAOS();
	}, 500);
}
});
</script>
