<script>
$(window).load(function(){
	var evtAOS = function() {
		AOS.init({
			duration: 600, //default: 400
			easing: 'ease-out', //default: ease
            offset: 50,
		});
	}
	evtAOS();

	//main swiper
	var mainSwiper = new Swiper('.evt_main_slide', {
		slidesPerView: 1,
		pauseOnMouseEnter: true,
		allowTouchMove: true,
		watchOverflow:true,
		loop:true,
		speed:1000,
		navigation: {
			nextEl: '.evt_main_slide .swiper-button-next',
			prevEl: '.evt_main_slide .swiper-button-prev',
		},
		pagination: {
			el: '.evt_main_slide .swiper_paging',
		},
		effect: 'fade',
		fadeEffect: { 
			crossFade: true 
		},
		on: {
			slideChange: function () {
				$('.evt_main_slide .swiper-slide-next .abs').hide();
				$('.evt_main_slide .swiper-slide-next .abs').removeClass('aos-init').removeClass('aos-animate');
				$('.evt_main_slide .swiper-slide-prev .abs').fadeOut(200);
				$('.evt_main_slide .swiper-slide-prev .abs').removeClass('aos-init').removeClass('aos-animate');
				
				setTimeout(function() {
					$('.evt_main_slide .swiper-slide-active .abs').show();
					evtAOS();
				}, 400);
			},
		} 
	});

	//brand swiper
	var brandSwiper = new Swiper('.swiper_brand', {
		slidesPerView: 1,
		pauseOnMouseEnter: true,

		},

			el: '.swiper_brand .swiper_paging',
		},
		effect: 'fade',
		fadeEffect: { 
			crossFade: true 
		},
        speed:500,

		// 	disableOnInteraction: true,
		// 	delay: 3000,
		// },
		pauseOnMouseEnter:true,
		observer: true,
		observeParents: true,
	});
});
</script>
