<script>
    $(document).ready(function(){
        //Visual Swiper
        var visualSwiper = new Swiper(".swiper_visual", {
            slidesPerView: 1.1,
            centeredSlides: true,
            speed:4000,
            observer: true,
            loop: true,
            autoplay: {
                delay: 0
            },
        });

        //상품슬라이드
        $(".evt_prod").each(function(index, element){
            var $this = $(this);
            $this.addClass('evtSwiper-' + index);
            var typeSlider = $this.find('.prod_swiper');

            var productSwiper = new Swiper(typeSlider, {
                autoplay: {
                    delay: 3500,
                },
                slidesPerView: 1.6,
                spaceBetween: 10,
                // loop: true,
                speed: 700,
                allowTouchMove: true,
                roundLengths: true, //일반 해상도 화면에서 텍스트가 흐려지는 것을 방지하기 위해 슬라이드 너비와 높이 값을 반올림
                navigation: {
                    nextEl: ".evtSwiper-" + index + " .swiper-button-next",
                    prevEl: ".evtSwiper-" + index + " .swiper-button-prev",
                },
            });
        });
    });
</script>
