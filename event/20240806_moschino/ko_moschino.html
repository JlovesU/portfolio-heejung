<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
$(document).ready(function(){
	gsap.registerPlugin(ScrollTrigger);

	$(".prod_list").each(function(index, element){
		$(this).addClass('evtSwiper-' + index);
		let sections = gsap.utils.toArray(".evtSwiper-"+ index + " li");

		gsap.to(sections, {
			xPercent: -100 * (sections.length - 2.5),
			ease: "none",
			scrollTrigger: {
				trigger: ".evtSwiper-"+ index,
				start: () => "top " + 160,
				pin: true,
				scrub: 1,
				//snap: 1 / (sections.length - 1),
				end: () => "+=" + document.querySelector(".evtSwiper-"+ index).offsetWidth - innerWidth
			}
		});
	});
});
</script>
