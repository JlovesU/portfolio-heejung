<link href="https://cdn.hddfs.com/front/css/KO/aos.css" rel="stylesheet"><!-- aos -->

<script>
$(function(){
    //swiper
    var productSwiper = new Swiper(".evt_visual_swiper", {
        speed: 0,
        spaceBetween: 0,
        loop: true,
        allowTouchMove: false,
        watchOverflow:true,
        observer: true,
        observeParents: true,
        effect: 'fade',
        fadeEffect: { 
            crossFade: true,
        },
        autoplay: {
            disableOnInteraction: true,
            delay: 500,
        },
    });

    // tab fixed
	var tabFix = function() {
		var tabStr = $("#evtCont").offset();
		var tabEnd = $(".section2").offset();
		var tabEndHH = $(".section2").height();
		var headerHH = $(".header").height();

		if (($(window).scrollTop() > tabStr.top - headerHH) && ($(window).scrollTop() < tabEnd.top - headerHH)) {
			$("#evtTab").addClass("fixed");
			$("#evtTab").removeClass("stop");
			$("#evtTab").css("top", headerHH);
		} else if ($(window).scrollTop() > tabEnd.top - headerHH - 1) {
			$("#evtTab").addClass("stop");
			$("#evtTab").css("top", tabEnd.top - headerHH - tabEndHH);
		} else {
			$("#evtTab").removeClass("fixed");
			$("#evtTab").removeClass("stop");
			$("#evtTab").css("top", 0);
		}
		console.log(tabStr.top);
	}

	// 탭매뉴 스크롤이동
	$('.scroll_btn').click(function(e){
		e.preventDefault();
		$('.scroll_btn').removeClass("active");
		$(this).addClass("active")
		$('html,body').animate({scrollTop:$(this.hash).offset().top - 100}, 500);
	});

	var evtAOS = function() {
		AOS.init({
			offset: 200, // default: 120
			duration: 600, //default: 400
			easing: 'ease-out' //default: ease
		});
	}
	setTimeout(function() {
		evtAOS();
	}, 400);

	$(window).scroll(function() {
		tabFix();
	});
});
</script>
