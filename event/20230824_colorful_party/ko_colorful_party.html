<script>
$(function(){
	//swiper
	var productSwiper = new Swiper(".evt_visual_swiper", {
		speed: 0,
		spaceBetween: 0,
		loop: true,
		allowTouchMove: false,
		watchOverflow:true,
		observer: true,
		observeParents: true,
		effect: 'fade',
		fadeEffect: { 
			crossFade: true,
		},
		autoplay: {
			disableOnInteraction: true,
			delay: 500,
		},
	});

	// tab fixed
	var tabFix = function() {
		var contentNum = $("#evtCont .evt_sect").size();
		var tabStr = $("#evtCont").offset();
		var tabEnd = $(".evt_sect").eq(contentNum).offset();
		var tabEndHH = $(".evt_sect").eq(contentNum).height();
		var headerHH = $(".header").height();

		if (($(window).scrollTop() > tabStr.top - 150 - headerHH) && ($(window).scrollTop() < tabEnd.top - headerHH)) {
			$("#evtTab").addClass("fixed");
			$("#evtTab").removeClass("stop");
			$("#evtTab").css("top", headerHH);
		} else if ($(window).scrollTop() > tabEnd.top - headerHH - 1) {
			$("#evtTab").addClass("stop");
			$("#evtTab").css("top", tabEnd.top - headerHH - tabEndHH);
		} else {
			$("#evtTab").removeClass("fixed");
			$("#evtTab").removeClass("stop");
			$("#evtTab").css("top", -66);
		}
		// console.log(tabStr.top);
	}

	// 탭매뉴 스크롤이동
	$('.scroll_btn').click(function(e){
		e.preventDefault();
		$('.scroll_btn').removeClass("active");
		$(this).addClass("active")
		$('html,body').animate({scrollTop:$(this.hash).offset().top - 100}, 500);
	});

	//Tab Contents
	$(".evt_box_tab a").click(function(){
		var tab_id = $(this).attr("data-tab");
		$(".evt_box_tab a").removeClass("current");
		$(".tab-cont").removeClass("current");
		$(this).addClass("current");
		$("#"+tab_id).addClass("current");
	});

	var evtAOS = function() {
		AOS.init({
			offset: 200, // default: 120
			duration: 600, //default: 400
			easing: 'ease-out' //default: ease
		});
	}
	setTimeout(function() {
		evtAOS();
	}, 400);

	$(window).scroll(function() {
		tabFix();
	});
});
</script>
