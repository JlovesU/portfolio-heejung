<SCRIPT>
    $(document).ready(function(){
        setTimeout(function () {
            $('#event00 .swiper_main .swiper-slide-active .img_hand').addClass('active');

        var mainSwiper = new Swiper(".swiper_main", {
            autoplay: {
                delay: 3500,
            },
            speed: 800,
            slidesPerView: 'auto',

            on: {
                slideChangeTransitionEnd: function () {
                    $('#event00 .swiper_main .img_hand').removeClass('active');

    //push 확인
    function chkPush(evntId){
    // 로그인체크
    if (!isLogin) { alert("请登录"); login(); return; }//로그인 후 이용해주세요.

        $.ajax({
            async: true,
            url: ctx_curr + '/op/evnt/otsdEvnt/otsdEvntAppPushYn.json',
            dataType: 'json',
            type: 'POST',
            data: {
                evntId: evntId
            },
            success: function (data, textStatus, jqXHR) {
                if (!crew.ajaxValidate(data)) {
                    return;
                }
                console.log(data.appPushYn);
                if(data.appPushYn == 'Y'){
                    addEvnt(evntId);
                }else{
                    alert("本活动只限开启APP消息推送的客户可参与。")//본 이벤트는 APP PUSH 알림설정 고객에 한해 참여 가능합니다.
                }
            },
            error: function (jqXHR, textStatus, errorThrown) {}
        });
    };

    //push 30일 이상 확인
    function chkPush2(evntId){
    // 로그인체크
    if (!isLogin) { alert("请登录"); login(); return; }//로그인 후 이용해주세요.

        $.ajax({
            async: true,
            url: ctx_curr + '/op/evnt/otsdEvnt/otsdEvntAppPushYnChk.json',
            dataType: 'json',
            type: 'POST',
            data: {
                evntId: evntId
            },
            success: function (data, textStatus, jqXHR) {
                if (!crew.ajaxValidate(data)) {
                    return;
                }
                console.log(data.appPushYn);
                if(data.appPushYn == 'Y'){
                    addEvnt(evntId);
                }else{
                    alert("本活动只限开启APP消息推送并保持30天的客户可参与。")//본 이벤트는 최근 30일동안 APP PUSH 알림설정이 ON인 고객에 한해 참여 가능합니다.
                }
            },
            error: function (jqXHR, textStatus, errorThrown) {}
        });
    };
