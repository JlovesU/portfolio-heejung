<script>
$(document).ready(function(){
	AOS.init({
		duration: 600, //default: 400
		easing: 'ease-out' //default: ease
	});

	setTimeout(function () {
		$('#event00 .swiper_main .swiper-slide-active .img_hand').addClass('active');
	}, 300)

	var mainSwiper = new Swiper(".swiper_main", {
		autoplay: {
			delay: 3500,
		},
		speed: 800,
		slidesPerView: 'auto',
		allowTouchMove: true,
		loop: true,
		// effect: 'fade',
		on: {
			slideChangeTransitionEnd: function () {
				$('#event00 .swiper_main .img_hand').removeClass('active');
				$('#event00 .swiper_main .swiper-slide-active .img_hand').addClass('active');
			},
		},
	});
});
</script>
