<SCRIPT>

    //앱 푸시정보 - PMS활성화여부 판단용 - 콜백 : pmsPushInfo(PMSpush 'Y'/'N', Devicepush 'Y','N')
    //WEB에서 PMS 활성 여부 판단 불가, 앱에서 조회
    function appPMSPushInfo() {
        // 로그인체크
        if (!isLogin) { alert("请登录"); login(); return; }//로그인 후 이용해주세요.
        if (appYn != "Y") { return; }
        if (appOs() == "undefined" || appOs() == "" || appOs() == null) { return; }

        try {
            if (appOs() == "android") {
                android.pmsPushInfo();
            } else if (appOs() == "ios") {
                location.href = "pmsPushInfo://";
            } else {
                alert("미지원 OS입니다.");
            }
        } catch (e) {
            //console.log(e);
            alert(e);
        }
    }

    //푸시 정보 콜백 (y/n)
    function pmsPushInfo(pmsPush, devicePush) {
        if (appYn != "Y") { return; }
        if (appOs() == "undefined" || appOs() == "" || appOs() == null) { return; }

        var appDevicePushYN = devicePush;
        var appPmsPushYN = pmsPush;
        var urlParam = new URLSearchParams(window.location.search);
        var param = urlParam.get('evntId');
        //alert(param);

        //앱 푸시 상태 활성화 설정
        if (appDevicePushYN == 'N') {  //어플 알람설정값(devicePush) N인경우는 tmsPush에 상관없이 푸시 false
            alert("本活动只限开启APP消息推送的客户可参与。")//본 이벤트는 APP PUSH 알림설정 고객에 한해 참여 가능합니다.
        } else {
            if (appPmsPushYN == 'Y') {
                //Y로 전달
                addEvnt("0004340");
            } else {
                alert("本活动只限开启APP消息推送的客户可参与。")//본 이벤트는 APP PUSH 알림설정 고객에 한해 참여 가능합니다.
            }
        }
    }

    //push 확인
    function chkPush(evntId) {
        // 로그인체크
        if (!isLogin) { alert("请登录"); login(); return; }//로그인 후 이용해주세요.

        $.ajax({
            async: true,
            url: ctx_curr + '/op/evnt/otsdEvnt/otsdEvntAppPushYn.json',
            dataType: 'json',
            type: 'POST',
            data: {
                evntId: evntId
            },
            success: function (data, textStatus, jqXHR) {
                if (!crew.ajaxValidate(data)) {
                    return;
                }
                console.log(data.appPushYn);
                if (data.appPushYn == 'Y') {
                    addEvnt(evntId);
                } else {
                    alert("本活动只限开启APP消息推送的客户可参与。")//본 이벤트는 APP PUSH 알림설정 고객에 한해 참여 가능합니다.
                }
            },
            error: function (jqXHR, textStatus, errorThrown) { }
        });
    };

    //push 30일 이상 확인
    function chkPush2(evntId) {
        // 로그인체크
        if (!isLogin) { alert("请登录"); login(); return; }//로그인 후 이용해주세요.

        $.ajax({
            async: true,
            url: ctx_curr + '/op/evnt/otsdEvnt/otsdEvntAppPushYnChk.json',
            dataType: 'json',
            type: 'POST',
            data: {
                evntId: evntId
            },
            success: function (data, textStatus, jqXHR) {
                if (!crew.ajaxValidate(data)) {
                    return;
                }
                console.log(data.appPushYn);
                if (data.appPushYn == 'Y') {
                    addEvnt(evntId);
                } else {
                    alert("本活动只限开启APP消息推送并保持30天的客户可参与。")//본 이벤트는 최근 30일동안 APP PUSH 알림설정이 ON인 고객에 한해 참여 가능합니다.
                }
            },
            error: function (jqXHR, textStatus, errorThrown) { }
        });
    };
